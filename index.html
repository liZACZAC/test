<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時 AI 內網監控中心</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #f0f3f5; padding: 15px; margin: 0; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        button { font-size: 15px; padding: 12px 20px; margin: 5px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #28a745; color: white; }
        input { padding: 10px; font-size: 15px; width: 60%; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; text-align: center; }
        #cam-render { margin: 15px auto; border: 4px solid #ccc; border-radius: 10px; width: 320px; height: 240px; background: #000; object-fit: cover; display: block; }
        .status-box { padding: 12px; margin: 10px 0; border-radius: 8px; font-weight: bold; font-size: 1.1rem; background: #e9ecef; }
        .cooldown { background: #dc3545 !important; color: white !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>極速即時 AI 監控中心</h2>
    
    <input type="text" id="cam-ip" value="111.222.1.X" placeholder="請輸入 ESP32-CAM 的 IP">
    <br>
    <button onclick="initSystem()">啟動即時系統</button>

    <img id="cam-render" crossOrigin="anonymous" src="" alt="等待影像中...">
    
    <div class="status-box" id="mqtt-status">MQTT 控制通道: 未連線</div>
    <div class="status-box" id="current-prediction">AI 狀態: 等待系統啟動...</div>
</div>

<script type="text/javascript">
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/MNvudxhn0/";
    const TOPIC_CONTROL = "esp32cam/control";

    let model, mqttClient;
    let isCooldown = false;

    async function initSystem() {
        document.getElementById('current-prediction').innerText = "載入 AI 模型中...";
        model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
        
        // 1. 連線 MQTT（純粹發送馬達控制指令用，所以非常快）
        setupMQTT();

        // 2. 載入即時內網影像
        const ip = document.getElementById('cam-ip').value.trim();
        const imgElement = document.getElementById('cam-render');
        imgElement.src = "http://" + ip; 

        // 3. 啟動高頻率即時 AI 辨識迴圈
        setTimeout(predictLoop, 1000); 
    }

    function setupMQTT() {
        mqttClient = new Paho.MQTT.Client("test.mosquitto.org", 8081, "web_client_" + parseInt(Math.random() * 10000, 10));
        mqttClient.connect({
            useSSL: true,
            onSuccess: () => {
                document.getElementById('mqtt-status').innerText = "MQTT 控制通道: 已就緒 (Mosquitto)";
                document.getElementById('mqtt-status').style.color = "green";
            }
        });
    }

    // 真正的即時預測迴圈 (每秒執行 10~20 次，不再卡頓)
    async function predictLoop() {
        const imgElement = document.getElementById('cam-render');
        
        // 確保圖片已經載入完成，才餵給 AI
        if (model && !isCooldown && imgElement.complete && imgElement.naturalWidth !== 0) {
            const prediction = await model.predict(imgElement);
            let highestClass = "";
            let highestProb = 0;

            for (let i = 0; i < prediction.length; i++) {
                if (prediction[i].probability > highestProb) {
                    highestProb = prediction[i].probability;
                    highestClass = prediction[i].className;
                }
            }

            const predBox = document.getElementById('current-prediction');
            if (highestProb > 0.85) {
                predBox.innerText = `辨識結果: ${highestClass} (${(highestProb*100).toFixed(0)}%)`;

                if (highestClass === "R" || highestClass === "L") {
                    isCooldown = true;
                    predBox.classList.add("cooldown");
                    predBox.innerText = `觸發【${highestClass}】！控制馬達中...`;

                    // 發送指令（走 MQTT 速度極快）
                    const mqttMessage = new Paho.MQTT.Message(highestClass);
                    mqttMessage.destinationName = TOPIC_CONTROL;
                    mqttClient.send(mqttMessage);

                    setTimeout(() => {
                        isCooldown = false;
                        predBox.classList.remove("cooldown");
                    }, 3000);
                }
            } else {
                predBox.innerText = "辨識中...";
            }
        }
        // 使用 requestAnimationFrame 讓 AI 以瀏覽器最快極速不斷辨識
        requestAnimationFrame(predictLoop);
    }
</script>

</body>
</html>
