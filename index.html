<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQTT AI 雲端監控中心</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #f0f3f5; padding: 15px; margin: 0; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        button { font-size: 15px; padding: 12px 20px; margin: 8px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #28a745; color: white; }
        #cam-render { margin: 15px auto; border: 4px solid #ccc; border-radius: 10px; width: 320px; height: 240px; background: #000; object-fit: cover; }
        .status-box { padding: 12px; margin: 10px 0; border-radius: 8px; font-weight: bold; font-size: 1.1rem; background: #e9ecef; }
        .cooldown { background: #dc3545 !important; color: white !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>MQTT AI 遠端監控中心</h2>
    <button onclick="initSystem()">啟動雲端 AI 系統</button>

    <img id="cam-render" src="" alt="等待影像串流...">
    
    <div class="status-box" id="mqtt-status">MQTT 狀態: 未連線</div>
    <div class="status-box" id="current-prediction">AI 狀態: 等待系統啟動...</div>
</div>

<script type="text/javascript">
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/MNvudxhn0/";
    
    // MQTT 主題定義
    const TOPIC_VIDEO = "esp32cam/video";
    const TOPIC_CONTROL = "esp32cam/control";

    let model, mqttClient;
    let isCooldown = false;

    async function initSystem() {
        document.getElementById('current-prediction').innerText = "載入 AI 模型中...";
        model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
        document.getElementById('current-prediction').innerText = "模型載入成功！正在連線雲端 MQTT...";
        
        setupMQTT();
    }

    function setupMQTT() {
        // 使用 HiveMQ 的公用 WebSockets 埠 (8000)
        mqttClient = new Paho.MQTT.Client("broker.hivemq.com", 8000, "web_client_" + parseInt(Math.random() * 100, 10));

        mqttClient.onConnectionLost = (responseObject) => {
            document.getElementById('mqtt-status').innerText = "MQTT 斷線: " + responseObject.errorMessage;
            document.getElementById('mqtt-status').style.color = "red";
        };

        mqttClient.onMessageArrived = async (message) => {
            if (message.destinationName === TOPIC_VIDEO) {
                // 1. 收到影像 Base64 字串，更新到 <img> 標籤上
                const imgElement = document.getElementById('cam-render');
                imgElement.src = "data:image/jpeg;base64," + message.payloadString;

                // 2. 丟進 Teachable Machine 模型進行辨識
                if (!isCooldown && model) {
                    await analyzeImage(imgElement);
                }
            }
        };

        mqttClient.connect({
            onSuccess: () => {
                document.getElementById('mqtt-status').innerText = "MQTT 狀態: 已連線至雲端";
                document.getElementById('mqtt-status').style.color = "green";
                mqttClient.subscribe(TOPIC_VIDEO); // 訂閱影像串流
            }
        });
    }

    async function analyzeImage(imgElement) {
        const prediction = await model.predict(imgElement);
        let highestClass = "";
        let highestProb = 0;

        for (let i = 0; i < prediction.length; i++) {
            if (prediction[i].probability > highestProb) {
                highestProb = prediction[i].probability;
                highestClass = prediction[i].className;
            }
        }

        const predBox = document.getElementById('current-prediction');
        if (highestProb > 0.85) {
            predBox.innerText = `辨識結果: ${highestClass} (${(highestProb*100).toFixed(0)}%)`;

            if (highestClass === "R" || highestClass === "L") {
                isCooldown = true;
                predBox.classList.add("cooldown");
                predBox.innerText = `發送指令【${highestClass}】，冷卻 3 秒...`;

                // 發送控制訊號至 MQTT
                const mqttMessage = new Paho.MQTT.Message(highestClass);
                mqttMessage.destinationName = TOPIC_CONTROL;
                mqttClient.send(mqttMessage);

                setTimeout(() => {
                    isCooldown = false;
                    predBox.classList.remove("cooldown");
                }, 3000);
            }
        }
    }
</script>

</body>
</html>
